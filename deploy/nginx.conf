worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main buffer=16k flush=5s;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;
    client_max_body_size 500m;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/x-javascript application/xml
        image/svg+xml font/woff2;

    # ── Upstream keepalive pools (reuse connections to backends) ─────────────
    upstream backend {
        server backend:8371;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3847;
        keepalive 16;
    }

    upstream minio {
        server minio:9000;
        keepalive 16;
    }

    # ── Main server block ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Backend API & docs ───────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";   # enable keepalive to upstream
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_buffering    on;
            proxy_buffer_size  8k;
            proxy_buffers      16 8k;
        }

        location /docs      { proxy_pass http://backend; proxy_http_version 1.1; proxy_set_header Connection ""; proxy_set_header Host $host; }
        location /redoc     { proxy_pass http://backend; proxy_http_version 1.1; proxy_set_header Connection ""; proxy_set_header Host $host; }
        location /openapi.json { proxy_pass http://backend; proxy_http_version 1.1; proxy_set_header Connection ""; proxy_set_header Host $host; }
        location /healthz   { proxy_pass http://backend; proxy_http_version 1.1; proxy_set_header Connection ""; proxy_set_header Host $host; }

        # ── MinIO S3 storage ─────────────────────────────────────────────────
        location /contentforge-assets/ {
            proxy_pass             http://minio/contentforge-assets/;
            proxy_http_version     1.1;
            proxy_set_header       Connection        "";
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout     300s;
            proxy_send_timeout     300s;
            proxy_request_buffering off;
            client_max_body_size   500m;

            # Cache public assets in browser for 7 days
            add_header Cache-Control "public, max-age=604800, immutable";
            add_header Vary "Accept-Encoding";
        }

        # ── Frontend (Next.js) ───────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }
}
