[tool.uv.workspace]
members = ["backend"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "ANN", "S", "B", "A", "C4", "T20"]
ignore = ["ANN101", "ANN102", "ANN401", "S101"]

[tool.ruff.lint.per-file-ignores]
"backend/tests/**" = ["ANN", "S"]
"backend/migrations/**" = ["ANN"]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests"]
